spring.application.name=Hackathon

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/Hackathon?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties..hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} - %-5level - %logger{50} - %msg%n
logging.logback.rollingpolicy.max-file-size=2GB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.btvn.hackathon = INFO